name: Build and push image

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the all branches
  push:
    branches: [ '**' ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build-amd64:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Extract branch name
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_REF##*/}" >> $GITHUB_ENV
        id: extract_branch

      # Login to docker hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push latest image - if master branch
      - name: Build and push latest image
        if: ${{ steps.extract_branch.outputs.branch == 'master' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: wpjsro/build-base:latest-amd64

      # Build and push image with tag by branch name - if not master branch
      - name: Build and push tagged image
        if: ${{ steps.extract_branch.outputs.branch != 'master' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: wpjsro/build-base:${{ steps.extract_branch.outputs.branch }}-amd64

  build-arm64:
    runs-on: ubuntu-24.04-arm

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Extract branch name
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_REF##*/}" >> $GITHUB_ENV
        id: extract_branch

      # Login to docker hub
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and push latest image - if master branch
      - name: Build and push latest image
        if: ${{ steps.extract_branch.outputs.branch == 'master' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: wpjsro/build-base:latest-arm64

      # Build and push image with tag by branch name - if not master branch
      - name: Build and push tagged image
        if: ${{ steps.extract_branch.outputs.branch != 'master' }}
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: wpjsro/build-base:${{ steps.extract_branch.outputs.branch }}-arm64

  merge-images:
    runs-on: ubuntu-latest
    needs: [ build-amd64, build-arm64 ]

    steps:
      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_REF##*/}" >> $GITHUB_ENV
        id: extract_branch

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_LOGIN }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create and push Docker manifest for latest
        if: ${{ steps.extract_branch.outputs.branch == 'master' }}
        run: |
          docker manifest create wpjsro/build-base:latest \
            --amend wpjsro/build-base:latest-amd64 \
            --amend wpjsro/build-base:latest-arm64
          docker manifest push wpjsro/build-base:latest

      - name: Create and push Docker manifest for tagged versions
        if: ${{ steps.extract_branch.outputs.branch != 'master' }}
        run: |
          docker manifest create wpjsro/build-base:${{ steps.extract_branch.outputs.branch }} \
            --amend wpjsro/build-base:${{ steps.extract_branch.outputs.branch }}-amd64 \
            --amend wpjsro/build-base:${{ steps.extract_branch.outputs.branch }}-arm64
          docker manifest push wpjsro/build-base:${{ steps.extract_branch.outputs.branch }}